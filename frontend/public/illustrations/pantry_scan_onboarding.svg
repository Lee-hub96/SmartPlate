<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shelf -->
  <rect x="50" y="220" width="300" height="10" rx="5" fill="#BDC3C7"/>
  <rect x="50" y="140" width="300" height="10" rx="5" fill="#BDC3C7"/>
  
  <!-- Items on shelf -->
  <rect x="70" y="170" width="40" height="50" rx="4" fill="#F39C12" fill-opacity="0.6"/>
  <rect x="120" y="160" width="30" height="60" rx="4" fill="#2ECC71" fill-opacity="0.6"/>
  <rect x="250" y="180" width="40" height="40" rx="4" fill="#3498DB" fill-opacity="0.6"/>
  
  <rect x="80" y="90" width="30" height="50" rx="4" fill="#E74C3C" fill-opacity="0.6"/>
  <rect x="160" y="80" width="40" height="60" rx="4" fill="#9B59B6" fill-opacity="0.6"/>
  
  <!-- Person (Simplified) -->
  <circle cx="200" cy="150" r="100" stroke="#2ECC71" stroke-width="2" stroke-dasharray="10 5"/>
  <rect x="160" y="110" width="80" height="140" rx="12" fill="white" stroke="#2C3E50" stroke-width="4"/>
  <rect x="170" y="125" width="60" height="90" rx="4" fill="#ECF0F1"/>
  
  <!-- Scanning Light -->
  <rect x="170" y="160" width="60" height="2" fill="#2ECC71">
    <animate attributeName="y" values="130;210;130" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Phone Hand -->
  <path d="M150 250Q140 230 160 220" stroke="#2C3E50" stroke-width="6" stroke-linecap="round"/>
</svg>
