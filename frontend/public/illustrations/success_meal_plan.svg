<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Success Circle -->
  <circle cx="200" cy="130" r="60" fill="#2ECC71" fill-opacity="0.1"/>
  <circle cx="200" cy="130" r="50" fill="#2ECC71"/>
  
  <!-- Checkmark -->
  <path d="M175 130L192 147L225 114" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" from="0 100" to="100 100" dur="0.5s" fill="freeze" />
  </path>
  
  <!-- Confetti/Dots -->
  <circle cx="130" cy="80" r="4" fill="#F1C40F">
    <animate attributeName="cy" values="80;70;80" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="270" cy="90" r="5" fill="#3498DB">
    <animate attributeName="cy" values="90;100;90" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="120" cy="180" r="4" fill="#E74C3C"/>
  <circle cx="280" cy="170" r="6" fill="#9B59B6"/>
  
  <!-- Text -->
  <text x="200" y="230" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="24" fill="#2C3E50">Bon Appétit!</text>
  <text x="200" y="260" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#7F8C8D">Your meal plan is ready.</text>
</svg>
